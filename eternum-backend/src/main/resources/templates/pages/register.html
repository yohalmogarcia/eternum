<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Registrarse</title>
</head>
<body>
    <div layout:fragment="content">
        <section class="min-h-[calc(100vh-300px)] flex items-center justify-center px-4 py-20 bg-slate-200">
            <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-lg border border-gray-100 fade-in">
                <!-- Header -->
                <div class="text-center mb-8">
                    <div class="w-16 h-16 bg-[#C9A063] rounded-full flex items-center justify-center text-[#1A2B3C] mx-auto mb-4">
                        <i class="fas fa-user-plus text-2xl"></i>
                    </div>
                    <h2 class="text-3xl font-bold serif">Crear Cuenta</h2>
                    <p class="text-gray-500 mt-2">Únete a Eternum para crear memoriales digitales</p>
                </div>
                
                <!-- Register Form -->
                <form id="registerForm" class="space-y-5" onsubmit="return handleRegister(event)">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
                            <input type="text" id="firstName" name="firstName" required
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#C9A063] focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Apellido</label>
                            <input type="text" id="lastName" name="lastName" required
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#C9A063] focus:outline-none">
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
                        <div class="relative">
                            <i class="fas fa-envelope absolute left-3 top-3 text-gray-400"></i>
                            <input type="email" id="email" name="email" required
                                   placeholder="ejemplo@correo.com" 
                                   class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#C9A063] focus:outline-none">
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono (opcional)</label>
                        <div class="relative">
                            <i class="fas fa-phone absolute left-3 top-3 text-gray-400"></i>
                            <input type="tel" id="phone" name="phone"
                                   placeholder="+1234567890" 
                                   class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#C9A063] focus:outline-none">
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-3 top-3 text-gray-400"></i>
                            <input type="password" id="password" name="password" required minlength="8"
                                   placeholder="Mínimo 8 caracteres" 
                                   class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#C9A063] focus:outline-none">
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Confirmar Contraseña</label>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-3 top-3 text-gray-400"></i>
                            <input type="password" id="confirmPassword" name="confirmPassword" required
                                   placeholder="Repite tu contraseña" 
                                   class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#C9A063] focus:outline-none">
                        </div>
                    </div>
                    
                    <!-- Terms and Privacy -->
                    <div class="flex items-start">
                        <input type="checkbox" id="hasConsentPrivacy" name="hasConsentPrivacy" required
                               class="mt-1 w-4 h-4 text-[#C9A063] border-gray-300 rounded focus:ring-[#C9A063]">
                        <label for="hasConsentPrivacy" class="ml-2 text-sm text-gray-600">
                            Acepto la <a href="#" class="text-[#C9A063] hover:underline">Política de Privacidad</a> y los 
                            <a href="#" class="text-[#C9A063] hover:underline">Términos de Servicio</a>. 
                            Consiento el procesamiento de mis datos personales.
                        </label>
                    </div>
                    
                    <button type="submit" id="registerBtn" class="btn-primary w-full py-3 rounded-lg font-bold shadow-md">
                        Crear Cuenta
                    </button>
                </form>
                
                <!-- Error Message -->
                <div id="errorMessage" class="hidden mt-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-600 text-sm"></div>
                
                <!-- Success Message -->
                <div id="successMessage" class="hidden mt-4 p-3 bg-green-50 border border-green-200 rounded-lg text-green-600 text-sm"></div>
                
                <!-- Divider -->
                <div class="relative my-8">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-200"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-gray-500">O regístrate con</span>
                    </div>
                </div>
                
                <!-- Social Register -->
                <div class="flex gap-4">
                    <button onclick="socialRegister('google')" class="flex-1 border border-gray-300 py-2 rounded-lg hover:bg-gray-50 transition-colors">
                        <i class="fab fa-google text-red-500"></i>
                    </button>
                    <button onclick="socialRegister('facebook')" class="flex-1 border border-gray-300 py-2 rounded-lg hover:bg-gray-50 transition-colors">
                        <i class="fab fa-facebook text-blue-600"></i>
                    </button>
                </div>
                
                <!-- Login Link -->
                <p class="mt-8 text-center text-sm text-gray-600">
                    ¿Ya tienes cuenta? 
                    <a th:href="@{/login}" class="text-[#C9A063] font-bold hover:underline">Iniciar Sesión</a>
                </p>
            </div>
        </section>
    </div>
    
    <th:block layout:fragment="scripts">
        <script th:src="@{/js/auth/AuthController.js}"></script>
    </th:block>
</body>
</html>
